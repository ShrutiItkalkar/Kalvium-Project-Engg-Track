<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      background: white;
      border-radius: 5px;
    }

    .user {
      color: blue;
      margin: 8px 0;
      text-align: right;
    }

    .bot {
      color: green;
      margin: 8px 0;
      text-align: left;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

<h2>AI Chatbot</h2>

<div id="chat"></div>

<div class="input-area">
  <input type="text" id="message" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let messages = [];

const input = document.getElementById("message");

// Enter key support
input.addEventListener("keypress", function (e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  // Add user message
  messages.push({ role: "user", content: text });
  updateChat();

  input.value = "";

  // Show typing
  messages.push({ role: "assistant", content: "Typing..." });
  updateChat();

  try {
    const response = await fetch("https://ai-chatbot-backend-sbz4.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await response.json();

    // Remove typing
    messages.pop();

    // Add AI reply
    messages.push({
      role: "assistant",
      content: data.reply || "No response"
    });

    updateChat();

  } catch (error) {
    console.error("Error:", error);

    messages.pop();
    messages.push({
      role: "assistant",
      content: "Error connecting to server"
    });

    updateChat();
  }
}

function updateChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role === "user" ? "user" : "bot";
    div.textContent = msg.content;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
