<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    #chat {
      height: 400px;
      overflow-y: scroll;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }

    .user {
      color: blue;
      margin: 5px 0;
    }

    .bot {
      color: green;
      margin: 5px 0;
    }

    input {
      width: 75%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>AI Chatbot</h2>

<div id="chat"></div>

<input type="text" id="message" placeholder="Type your message..." />
<button onclick="sendMessage()">Send</button>

<script>
let messages = [];

async function sendMessage() {
  const input = document.getElementById("message");
  const text = input.value.trim();

  if (!text) return;

  // Add user message
  messages.push({ role: "user", content: text });
  updateChat();

  input.value = "";

  // Show typing indicator
  messages.push({ role: "assistant", content: "Typing..." });
  updateChat();

  try {
    const response = await fetch("https://ai-chatbot-backend-sbz4.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ messages })
    });

    const data = await response.json();

    // Remove "Typing..."
    messages.pop();

    // Add real response
    messages.push({ role: "assistant", content: data.reply });
    updateChat();

  } catch (error) {
    console.error("Error:", error);

    messages.pop();
    messages.push({ role: "assistant", content: "Error getting response" });
    updateChat();
  }
}

function updateChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = msg.role === "user" ? "user" : "bot";
    div.textContent = `${msg.role}: ${msg.content}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
